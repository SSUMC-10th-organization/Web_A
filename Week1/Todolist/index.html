<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>UMC_TODO</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="./dist/index.js"></script>
</head>
<body>
    <div class="todo-app">
        <h1 class="todo-app__title">HOON TODO</h1>
        
        <div class="todo-app__input-group">
            <input type="text" id="todoInput" class="todo-app__input" placeholder="할 일 입력">
            <button type="button" id="addBtn" class="todo-app__add-btn">할 일 추가</button>
        </div>

        <div class="todo-app__content">
            <section class="todo-section">
                <h2 class="todo-section__title">할 일</h2>
                <ul id="todoList" class="todo-section__list"></ul>
            </section>

            <section class="todo-section">
                <h2 class="todo-section__title">완료</h2>
                <ul id="doneList" class="todo-section__list"></ul>
            </section>
        </div>
    </div>
</body>
</html>
